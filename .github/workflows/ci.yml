lint:
  name: Lint Code
  runs-on: ubuntu-latest
  strategy:
    matrix:
      service: [ scraper, indexer, analytics, api ]
  steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: '1.25'
    - name: golangci-lint
      uses: golangci/golangci-lint-action@v4
      with:
        version: latest
        working-directory: ${{ matrix.service }}
        # FIX 1: Compile the linter from source using Go 1.25
        install-mode: goinstall

  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [ scraper, indexer, analytics, api, pkg ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Test Service
        # FIX 2: Run tests from the root directory, pointing to the service folder
        run: go test -v ./${{ matrix.service }}/...

on:
jobs: